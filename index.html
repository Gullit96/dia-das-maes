<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Para a Melhor Mãe 💖</title>
  <link rel="stylesheet" href="estilos.css">
</head>
<body>

<div class="background"></div>

<header class="glass">
  <h1>Feliz Dia das Mães 💐</h1>
  <p id="typing"></p>
</header>

<section class="glass mensagem">
  <h2>Para você ❤️</h2>
  <p>
    Mãe, você é meu porto seguro, minha inspiração e minha maior força.
  </p>
  <p>
    Obrigado por cada momento, cada conselho e cada abraço.
  </p>

  <button onclick="surpresa()">Clique aqui 💝</button>
  <p id="mensagemFinal"></p>
</section>

<section class="galeria">
  <img src="assets/foto1.jpg">
  <img src="assets/foto2.jpg">
  <img src="assets/foto3.jpg">
</section>

<footer class="glass">
  <p>Feito com ❤️ especialmente para você!!!</p>
</footer>

<audio id="musica" loop>
  <source src="assets/musica.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>
</body>
</html>
